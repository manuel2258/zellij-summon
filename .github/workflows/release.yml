name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build wasm and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain with wasm32-wasip1 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --target wasm32-wasip1

      - name: Rename artifact
        run: |
          find target/wasm32-wasip1/release -maxdepth 1 -name '*.wasm' \
            -exec cp {} zellij-pane-manager.wasm \;
          test -f zellij-pane-manager.wasm

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: zellij-pane-manager.wasm
          generate_release_notes: true
