name: Auto Release

on:
  push:
    branches: [main]

# Prevent concurrent releases; cancel in-progress run on rapid pushes.
concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    name: Version bump, tag, and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use RELEASE_TOKEN when branch protection blocks GITHUB_TOKEN pushes.
          token: ${{ secrets.RELEASE_TOKEN || github.token }}

      - name: Compute next version (dry run)
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.RELEASE_TOKEN || github.token }}
          dry_run: true
          default_bump: patch
          tag_prefix: v
          # When no tags exist yet, treat 0.1.0 as the baseline so the
          # first auto-release always produces a version higher than Cargo.toml.
          initial_version: 0.1.0

      - name: Skip if tag already exists
        id: guard
        run: |
          NEW_TAG="${{ steps.tag.outputs.new_tag }}"
          if git tag -l "$NEW_TAG" | grep -qF "$NEW_TAG"; then
            echo "Tag $NEW_TAG already exists — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract bare version (strip leading v)
        if: steps.guard.outputs.skip == 'false'
        id: version
        run: |
          NEW_TAG="${{ steps.tag.outputs.new_tag }}"
          echo "bare=${NEW_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Update Cargo.toml version
        if: steps.guard.outputs.skip == 'false'
        run: |
          BARE="${{ steps.version.outputs.bare }}"
          sed -i "s/^version = \".*\"/version = \"$BARE\"/" Cargo.toml
          grep "^version = \"$BARE\"" Cargo.toml

      - name: Install Rust toolchain
        if: steps.guard.outputs.skip == 'false'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Cache cargo registry
        if: steps.guard.outputs.skip == 'false'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Build WASM
        if: steps.guard.outputs.skip == 'false'
        run: cargo build --release --target wasm32-wasip1

      - name: Copy artifact
        if: steps.guard.outputs.skip == 'false'
        run: |
          find target/wasm32-wasip1/release -maxdepth 1 -name '*.wasm' \
            -exec cp {} zellij-pane-manager.wasm \;
          test -f zellij-pane-manager.wasm

      - name: Commit version bump
        if: steps.guard.outputs.skip == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          if git diff --cached --quiet; then
            echo "ERROR: Cargo.toml unchanged after version bump — aborting."
            exit 1
          fi
          git commit -m "chore: release ${{ steps.tag.outputs.new_tag }}"

      - name: Create tag and push
        if: steps.guard.outputs.skip == 'false'
        run: |
          git tag -a "${{ steps.tag.outputs.new_tag }}" -m "Release ${{ steps.tag.outputs.new_tag }}"
          git push origin HEAD:main "${{ steps.tag.outputs.new_tag }}"

      - name: Create GitHub Release
        if: steps.guard.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          files: zellij-pane-manager.wasm
